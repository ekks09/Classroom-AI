services:
  # Frontend only - static site (backend runs on Colab + ngrok)
  - type: web
    name: classroom-ai-frontend
    runtime: static
    buildCommand: 'true'
    staticPublishPath: ./static
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /student
        destination: /student.html
      - type: rewrite
        source: /teacher
        destination: /teacher.html
      - type: rewrite
        source: /:path*
        destination: /:path*
    envVars:
      - key: NODE_ENV
        value: production

# Note: Backend runs separately on Colab with ngrok tunnel.
# Set DEFAULT_BACKEND_URL in static/js/config.js to your ngrok URL.

