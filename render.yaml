services:
  # Backend (FastAPI)
  - type: web
    name: classroom-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # Frontend (static HTML/CSS/JS in ./static)
  - type: web
    name: classroom-ai-frontend
    runtime: static
    buildCommand: 'true'
    staticPublishPath: ./static
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /student
        destination: /student.html
      - type: rewrite
        source: /teacher
        destination: /teacher.html

