<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ORIS | Smart Classroom.ai</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/oris.css" />
</head>

<body>

  <!-- Background Effects -->
  <div class="bg-grid"></div>
  <div class="bg-overlay"></div>

  <!-- Main Container -->
  <main class="container">

    <!-- Left Branding Section -->
    <section class="hero">

      <p class="tag">Smart Classroom.ai</p>

      <h1 class="logo">ORIS</h1>

      <p class="subtitle">
        On-demand Resource & Intelligence System
      </p>

      <div class="badges">
        <span>AI Powered</span>
        <span>RAG Enabled</span>
        <span>Voice Assistant</span>
        <span>Smart Learning</span>
      </div>

    </section>

    <!-- Authentication Card -->
    <section class="card">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="loginTab">
          Login
        </button>

        <button class="tab" id="registerTab">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form">

        <div class="form-group">
          <label for="loginUser">Username</label>

          <input
            type="text"
            id="loginUser"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="form-group">
          <label for="loginPass">Password</label>

          <input
            type="password"
            id="loginPass"
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" class="btn">
          Access ORIS
        </button>

      </form>

      <!-- Register Form -->
      <form id="registerForm" class="form hidden">

        <div class="form-group">
          <label for="registerUser">Username</label>

          <input
            type="text"
            id="registerUser"
            placeholder="Choose username"
            required
          />
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>

          <input
            type="email"
            id="registerEmail"
            placeholder="Enter email"
            required
          />
        </div>

        <div class="form-group">
          <label for="registerPass">Password</label>

          <input
            type="password"
            id="registerPass"
            placeholder="Create password"
            required
          />
        </div>

        <button type="submit" class="btn">
          Create Account
        </button>

      </form>

      <!-- Footer -->
      <div class="card-footer">
        Intelligent Learning Platform • AI Enhanced Education
      </div>

    </section>

  </main>

  <!-- JavaScript -->
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>

</body>
</html>
