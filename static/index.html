<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ORIS | Smart Classroom.ai</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/oris.css" />
</head>

<body>
  <!-- Background Effects -->
  <div class="bg-grid"></div>
  <div class="bg-scan"></div>
  <div class="bg-vign"></div>
  <div class="bg-orbs"></div>
  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-wrap">
      <!-- Brand -->
      <div class="brand">
        <div class="brand-eyebrow">Smart Classroom.ai</div>
        <div class="brand-logo">ORIS</div>
        <div class="brand-sub">On-demand Resource & Intelligence System</div>
        <div class="brand-pills">
          <span class="pill">AI Powered</span>
          <span class="pill">RAG Enabled</span>
          <span class="pill">Voice Assistant</span>
          <span class="pill">Smart Learning</span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="loginTab">Login</button>
        <button class="tab-btn" id="registerTab">Register</button>
      </div>

      <!-- Login Card -->
      <section class="auth-card" id="loginCard">
        <!-- Login Form -->
        <form class="auth-form" id="loginForm">
          <div class="fgroup">
            <label class="flabel" for="loginUser">Username</label>
            <input
              type="text"
              id="loginUser"
              class="finput"
              placeholder="Enter username"
              required
            />
          </div>

          <div class="fgroup">
            <label class="flabel" for="loginPass">Password</label>
            <input
              type="password"
              id="loginPass"
              class="finput"
              placeholder="Enter password"
              required
            />
          </div>

          <button type="submit" class="btn">Access ORIS</button>
        </form>

        <div id="authMsg" class="msg hidden" role="status" aria-live="polite"></div>
      </section>

      <!-- Register Card -->
      <section class="auth-card hidden" id="registerCard">
        <!-- Register Form -->
        <form class="auth-form" id="registerForm">
          <div class="fgroup">
            <label class="flabel" for="registerUser">Username</label>
            <input
              type="text"
              id="registerUser"
              class="finput"
              placeholder="Choose username"
              required
            />
          </div>

          <div class="fgroup">
            <label class="flabel" for="registerEmail">Email</label>
            <input
              type="email"
              id="registerEmail"
              class="finput"
              placeholder="Enter email"
              required
            />
          </div>

          <div class="fgroup">
            <label class="flabel" for="registerPass">Password</label>
            <input
              type="password"
              id="registerPass"
              class="finput"
              placeholder="Create password"
              required
            />
          </div>

          <div class="frow">
            <div class="fgroup">
              <label class="flabel" for="registerRole">Role</label>
              <select id="registerRole" class="fselect" required>
                <option value="student" selected>Student</option>
                <option value="teacher">Teacher</option>
              </select>
            </div>

            <div class="fgroup">
              <label class="flabel" for="registerStyle">Learning Style</label>
              <select id="registerStyle" class="fselect" required>
                <option value="visual" selected>Visual</option>
                <option value="auditory">Auditory</option>
                <option value="reading">Reading</option>
                <option value="kinesthetic">Kinesthetic</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn">Create Account</button>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
          Intelligent Learning Platform • AI Enhanced Education
        </div>
      </section>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="/js/logger.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
